<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
  <title>Test technique - Coda</title>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <span class="title">Interview test</span>
  </div>

  <div class="code">
    <!-- int result = 0; -->
    <div>
      <span class="ln">1</span>
      <span class="kw">int</span>
      <span class="var"> result </span>
      <span class="op">=</span>
      <span class="num"> 0</span><span class="var">;</span>
    </div>

    <!-- int[] numbers = {3, 3, 5}; -->
    <div>
      <span class="ln">2</span>
      <span class="kw">int</span><span class="var">[] numbers </span>
      <span class="op">=</span>
      <span class="var"> {</span>
      <span class="num">3</span><span class="var">, </span>
      <span class="num">3</span><span class="var">, </span>
      <span class="num">5</span>
      <span class="var">};</span>
    </div>

    <!-- for (int x : numbers) { -->
    <div>
      <span class="ln">3</span>
      <span class="kw">for </span>
      <span class="var">(</span>
      <span class="kw">int </span>
      <span class="var">x </span>
      <span class="op">:</span>
      <span class="var"> numbers) {</span>
    </div>

    <!-- if (x > 3) { — the = is hidden -->
    <div>
      <span class="ln">4</span>
      <span class="var">&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span class="kw">if </span>
      <span class="var">(x </span>
      <span class="op">></span><span class="hidden-eq">=</span>
      <span class="num"> 3</span>
      <span class="var">) {</span>
    </div>

    <!-- result = result - x; -->
    <div>
      <span class="ln">5</span>
      <span class="var">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;result </span>
      <span class="op">=</span>
      <span class="var"> result </span>
      <span class="op">-</span>
      <span class="var"> x;</span>
    </div>

    <!-- } else { -->
    <div>
      <span class="ln">6</span>
      <span class="var">&nbsp;&nbsp;&nbsp;&nbsp;} </span>
      <span class="kw">else</span>
      <span class="var"> {</span>
    </div>

    <!-- result = result + x; -->
    <div>
      <span class="ln">7</span>
      <span class="var">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;result </span>
      <span class="op">=</span>
      <span class="var"> result </span>
      <span class="op">+</span>
      <span class="var"> x;</span>
    </div>

    <!-- } -->
    <div>
      <span class="ln">8</span>
      <span class="var">&nbsp;&nbsp;&nbsp;&nbsp;}</span>
    </div>

    <!-- } -->
    <div>
      <span class="ln">9</span>
      <span class="var">}</span>
    </div>
  </div>

  <div class="question">
    <strong>Quelle est la valeur de <code>result</code> ?</strong>
  </div>
</div>
</body>
</html>
