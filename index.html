      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <span class="title"></span>
  </div>
  <div class="code"></div>
  <div class="question"></div>
</div>

<script>
const SNIPPET = {
  title: "Interview test",
  question: "Quelle est la valeur de <code>result</code> ?",
  code: `\
int result = 0;
int v = 5;
int[] numbers = { 3, 5, 2, 5, 9 };
for ( int x  :  numbers) {
    if ( x >~~=~~ v ) {
        result = result - x;
    } else {
        result = result + x;
    }
}`
};
</script>
